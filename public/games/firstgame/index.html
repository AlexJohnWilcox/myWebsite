<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Dark Forest — firstGame</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0a0a;color:#c8c8c8;font-family:'Fira Mono','Consolas',monospace;font-size:15px}
    body{display:flex;flex-direction:column}
    #topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 20px;background:#111;border-bottom:1px solid #222;flex-shrink:0;
    }
    #topbar .title{color:#888;font-size:0.8rem;letter-spacing:1px}
    #terminal{
      flex:1;overflow-y:auto;padding:16px 20px;line-height:1.65;
      scroll-behavior:smooth;
    }
    #terminal .line{margin-bottom:2px;white-space:pre-wrap;word-wrap:break-word}
    #terminal .line.highlight{color:#f59e0b}
    #terminal .line.damage{color:#ef4444}
    #terminal .line.heal{color:#22c55e}
    #terminal .line.info{color:#22d3ee}
    #terminal .line.gold{color:#fbbf24}
    #terminal .line.dim{color:#555}
    #input-row{
      display:flex;align-items:center;gap:8px;
      padding:12px 20px;background:#111;border-top:1px solid #222;flex-shrink:0;
    }
    #prompt{color:#f59e0b;font-weight:700;flex-shrink:0}
    #input{
      flex:1;background:none;border:none;color:#e0e0e0;
      font-family:inherit;font-size:inherit;outline:none;caret-color:#f59e0b;
    }
    #input::placeholder{color:#444}
    #input:disabled{opacity:0.3}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0a0a0a}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
  </style>
</head>
<body>
  <div id="topbar">
    <span class="title">A DARK FOREST</span>
    <span class="title" id="stats-hint" style="cursor:pointer;color:#555" title="Press 'd' in game to view stats">firstGame</span>
  </div>
  <div id="terminal"></div>
  <div id="input-row">
    <span id="prompt">--&gt;</span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" placeholder="type here...">
  </div>
  <script src="game.js"></script>
</body>
</html>
